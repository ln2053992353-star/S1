<!--
  Biochemical Product Recommendation Report — Search Flow Integration

  Serve via Django runserver:
      python manage.py runserver 0.0.0.0:8000
      Open http://localhost:8000/

  Data source: frontend/data/interfaceData.json (loaded by Django view).
  The search form updates the raw_input field in the embedded JSON.
-->
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biochemical Product Recommendation Report</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- FontAwesome Icons CDN -->
  <link
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    rel="stylesheet"
  >

  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up {
      animation: fadeInUp 0.4s ease-out forwards;
    }
    @keyframes pulse-skeleton {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.4; }
    }
    .skeleton-pulse {
      animation: pulse-skeleton 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    .progress-fill {
      transition: width 0.6s ease-out;
    }
    details > summary {
      list-style: none;
    }
    details > summary::-webkit-details-marker {
      display: none;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-700 antialiased">

  <div class="container mx-auto px-4 py-10 max-w-5xl">

    <!-- Header -->
    <div class="text-center mb-10">
      <h1 class="text-3xl md:text-4xl font-extrabold text-gray-900 mb-2 tracking-tight">
        Biochemical Product Recommendation Report
      </h1>
      <p class="text-gray-500 text-sm">
        Powered by <span class="font-semibold text-blue-600">Volcengine AI</span>
        &amp; <span class="font-semibold text-pink-600">PubMedBert</span>
      </p>
    </div>

    <!-- Search Box -->
    <div class="bg-white p-6 rounded-2xl shadow-lg mb-8 border border-gray-100">
      <form action="/" method="get" class="flex flex-col sm:flex-row gap-3">
        <div class="relative flex-1">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <i class="fas fa-search text-gray-400"></i>
          </div>
          <input type="text" name="q" value="{{ query }}"
                 placeholder="Try: 'I want to make glass', 'Blue light response'..."
                 class="w-full pl-11 pr-4 py-4 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-lg transition shadow-sm">
        </div>
        <button type="submit"
                class="bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white px-8 py-4 rounded-xl font-bold text-lg shadow-md transition transform hover:scale-105 active:scale-95">
          Search
        </button>
      </form>
    </div>

    <!-- Embedded data for the frontend JS module -->
    <script id="search-data" type="application/json">{{ data_json|safe }}</script>

    <!-- Recommendation report mount point -->
    <div id="app"></div>

    <!-- ES module entry point -->
    <script type="module" src="{% static 'frontend/js/app.js' %}"></script>

  </div>

</body>
</html>
